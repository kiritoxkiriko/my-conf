"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$conda\
$nodejs\
$golang\
$rust\
$docker_context\
$kubernetes\
$container\
$character"""

[directory]
style = "blue"

[character]
success_symbol = "[ŌØ»](purple)"
error_symbol = "[ŌØ»](red)"
vimcmd_symbol = "[ŌØ«](green)"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[ ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = ""
untracked = ""
modified = ""
staged = ""
renamed = ""
deleted = ""
stashed = "ŌēĪ"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
symbol = "ŅłĄ "
format = "[$symbol$virtualenv]($style) "
style = "bright-black"
detect_extensions = []
detect_files = []

[conda]
symbol = "¾▒öÄ "
format = "[$symbol$environment]($style) "
style = "bright-black"
ignore_base = true

[nodejs]
symbol = "Ņ£ś "
format = "[$symbol$version]($style) "
style = "bright-black"
detect_extensions = ["js", "mjs", "cjs", "ts", "mts", "cts", "tsx"]
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = []

[golang]
symbol = "Ņś¦ "
format = "[$symbol$version]($style) "
style = "bright-black"

[rust]
symbol = "Ņ×© "
format = "[$symbol$version]($style) "
style = "bright-black"

[docker_context]
symbol = "’īł "
format = "[$symbol$context]($style) "
style = "bright-black"
only_with_files = true

[kubernetes]
disabled = false
symbol = "¾▒āŠ "
format = "[$symbol$context( $namespace)]($style) "
style = "bright-black"
detect_files = ["kustomization.yaml", "Chart.yaml", "skaffold.yaml"]
detect_folders = ["k8s", "kubernetes", "manifests", "charts"]

[container]
symbol = "Ō¼ó "
format = "[$symbol$name]($style) "
style = "bright-black"
